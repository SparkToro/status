owner: SparkToro
repo: status

assignees:
  - caseyhen

sites:
  - name: Website
    url: https://sparktoro.com
  - name: Public API
    url: https://api.sparktoro.com/health
    # The API host gates every path behind auth, so an unauthenticated probe
    # returns 401. A 401 proves the edge is alive (TLS + app responding), which
    # is what we monitor. Replace with a whitelisted public /health (expecting
    # 200) if/when one is added to the API service.
    expectedStatusCodes:
      - 200
      - 401
  - name: MCP Server
    url: https://mcp.sparktoro.com/health
  - name: API Docs
    url: https://sparktoro.com/api

status-website:
  cname: status.sparktoro.com
  name: SparkToro Status
  introTitle: "SparkToro Status"
  introMessage: Live and historical status for the SparkToro app, public API, and MCP server.
  theme: light
  logoUrl: https://raw.githubusercontent.com/SparkToro/status/master/brand/logo.svg
  favicon: https://raw.githubusercontent.com/SparkToro/status/master/brand/favicon.png
  navbar:
    - title: Status
      href: /
    - title: SparkToro
      href: https://sparktoro.com
  # SparkToro brand fonts (Montserrat) loaded into the page head.
  customHeadHtml: >-
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  # SparkToro brand: Montserrat font, deep teal-navy (#05242c) headings.
  # NOTE: the Upptime status page is a Svelte app, so it ignores Docusaurus
  # --ifm-* variables; brand styling must target real elements directly.
  css: |
    /* SparkToro brand font (Montserrat is loaded via customHeadHtml). */
    body, button, input, select, textarea {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
    }
    h1, h2, h3, h4 {
      color: #05242c;
    }
    /* Logo already contains the SparkToro wordmark — hide the redundant title text. */
    .logo > div {
      display: none;
    }

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
